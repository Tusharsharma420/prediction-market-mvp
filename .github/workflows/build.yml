name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-node: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: "file:./dev.db"

    - name: Run Production Verification Build
      run: npm run build
      env:
        DATABASE_URL: "file:./dev.db"
        NEXTAUTH_SECRET: "ci-test-secret-key-32-chars-at-least-super-long"
        NEXTAUTH_URL: "http://localhost:3008"
        NODE_ENV: production
